<!-- 
  FRAGMENTO HTML - Sistema de PIN
  
  Agregá este código en index.html, dentro de #adm-login-screen,
  ANTES del botón de Google login.
  
  Ubicación recomendada: Línea ~220 del index.html
-->

<!-- Sección PIN - Se muestra después de login Google exitoso -->
<div id="adm-pin-section" style="
  display: none;
  margin-bottom: 20px;
  padding: 20px;
  background: rgba(245, 158, 11, 0.08);
  border: 1px solid rgba(245, 158, 11, 0.3);
  border-radius: 14px;
">
  <!-- Título -->
  <div style="
    font-size: 13px;
    font-weight: 800;
    color: #f59e0b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  ">
    🔐 Verificación de Seguridad
  </div>
  
  <!-- Descripción -->
  <div style="
    font-size: 11px;
    color: #9ca3af;
    margin-bottom: 16px;
  ">
    Ingresá tu código PIN de 4 dígitos para acceder al panel.
  </div>
  
  <!-- Input PIN -->
  <input 
    type="password" 
    id="adm-pin-input" 
    placeholder="PIN (4 dígitos)"
    maxlength="4"
    pattern="[0-9]*"
    inputmode="numeric"
    autocomplete="off"
    style="
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    "
    onkeypress="if(event.key==='Enter') admVerifyPin()"
    onfocus="this.style.borderColor='#f59e0b'"
    onblur="this.style.borderColor='#333'"
  />
  
  <!-- Botón Verificar -->
  <button 
    onclick="admVerifyPin()" 
    style="
      width: 100%;
      padding: 14px;
      background: #f59e0b;
      color: #000;
      font-weight: 800;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    "
    onmouseover="this.style.background='#d97706'"
    onmouseout="this.style.background='#f59e0b'"
  >
    Verificar PIN
  </button>
  
  <!-- Feedback -->
  <div 
    id="adm-pin-feedback" 
    style="
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
      transition: all 0.2s;
    "
  ></div>
  
  <!-- Botón Volver -->
  <button
    onclick="
      document.getElementById('adm-pin-section').style.display='none';
      document.getElementById('adm-google-btn').style.display='block';
      document.getElementById('adm-pin-input').value='';
      document.getElementById('adm-pin-feedback').textContent='';
    "
    style="
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #6b7280;
      font-weight: 600;
      font-size: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    "
    onmouseover="this.style.borderColor='#f59e0b'; this.style.color='#f59e0b'"
    onmouseout="this.style.borderColor='#333'; this.style.color='#6b7280'"
  >
    ← Volver a login Google
  </button>
</div>
